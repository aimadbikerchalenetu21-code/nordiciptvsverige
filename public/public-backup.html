<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nordic IPTV Sverige – Sveriges Bästa IPTV-Tjänst 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080e;
  --bg2:#0c0e17;
  --bg3:#11141f;
  --card:#0e1118;
  --cyan:#ff6b35;
  --cyan2:#e55a25;
  --blue:#ff8c5a;
  --green:#00e676;
  --yellow:#ffd740;
  --red:#ff3d57;
  --text:#b8cad8;
  --text2:#7a90a8;
  --white:#f0f6ff;
  --border:rgba(0,212,255,0.12);
  --border2:rgba(0,212,255,0.25);
  --glow:0 0 30px rgba(0,212,255,0.25);
  --glow2:0 0 60px rgba(0,212,255,0.15);
  --r:12px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Outfit',sans-serif;color:var(--white);line-height:1.1;letter-spacing:-0.01em}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;font-family:inherit}
img{max-width:100%}
.container{max-width:1240px;margin:0 auto;padding:0 24px}
.tag{display:inline-flex;align-items:center;gap:6px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 14px;border-radius:30px;margin-bottom:16px}
.tag-cyan{background:rgba(0,212,255,.12);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
.tag-green{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.section-title{font-size:clamp(32px,4vw,52px);font-weight:800;text-align:center;margin-bottom:12px}
.section-sub{text-align:center;color:var(--text2);font-size:17px;max-width:600px;margin:0 auto 48px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;transition:all .2s}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#000;box-shadow:0 4px 20px rgba(0,212,255,.3)}
.btn-cyan:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,212,255,.5)}
.btn-outline{background:transparent;color:var(--cyan);border:1.5px solid var(--cyan)}
.btn-outline:hover{background:rgba(0,212,255,.08)}
.btn-glass{background:rgba(255,255,255,.08);color:var(--white);border:1.5px solid rgba(255,255,255,.18);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.btn-glass:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.28);transform:translateY(-2px)}
.btn-green{background:linear-gradient(135deg,var(--green),#00b05a);color:#000;box-shadow:0 4px 20px rgba(0,230,118,.25)}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,230,118,.4)}
.badge{display:inline-block;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px}
.badge-green{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.badge-cyan{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
.badge-yellow{background:rgba(255,215,64,.1);color:var(--yellow);border:1px solid rgba(255,215,64,.2)}
.badge-red{background:rgba(255,61,87,.1);color:var(--red);border:1px solid rgba(255,61,87,.2)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
.glow-line{width:80px;height:3px;background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:2px;margin:0 auto 32px}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3);border-radius:3px}

/* TOP BANNER */
.top-banner{background:linear-gradient(90deg,#0090c8,var(--cyan),#0090c8);padding:10px 48px;text-align:center;position:relative;z-index:1001}
.top-banner-text{font-size:13px;font-weight:600;color:#000;line-height:1.5}
.top-banner-text strong{font-weight:800}
.top-banner-close{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.15);border:none;color:#000;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.top-banner-close:hover{background:rgba(0,0,0,.3)}
/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;transition:all .3s}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px;gap:24px}
.nav.scrolled{background:rgba(7,8,14,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Outfit',sans-serif;font-size:22px;font-weight:900;letter-spacing:-.02em;white-space:nowrap}
.nav-logo span{color:var(--cyan)}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-link{padding:8px 14px;border-radius:6px;font-size:14px;font-weight:500;color:var(--text);transition:all .2s;white-space:nowrap}
.nav-link:hover,.nav-link.active{color:var(--white);background:rgba(255,255,255,.05)}
.nav-actions{display:flex;align-items:center;gap:12px}
.nav-trial{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#000;padding:9px 20px;border-radius:6px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:all .2s;white-space:nowrap}
.nav-trial:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,212,255,.4)}
.hamburger{display:none;flex-direction:column;gap:5px;padding:8px;cursor:pointer}
.hamburger span{width:22px;height:2px;background:var(--white);border-radius:2px;transition:.3s}
.mobile-menu{display:none;position:fixed;inset:68px 0 0;background:rgba(7,8,14,.98);backdrop-filter:blur(20px);padding:24px;z-index:999;flex-direction:column;gap:8px;overflow-y:auto}
.mobile-menu.open{display:flex}
.mobile-link{padding:14px 20px;border-radius:8px;font-size:18px;font-weight:600;color:var(--text);transition:.2s;border:1px solid transparent}
.mobile-link:hover{color:var(--white);border-color:var(--border2)}
@media(max-width:900px){.nav-links{display:none}.hamburger{display:flex}}

/* HERO */
.hero{padding:120px 0 80px;position:relative;overflow:hidden;min-height:100vh;display:flex;align-items:center}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,98,255,.12) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 80% 50%,rgba(0,212,255,.06) 0%,transparent 50%);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.hero-content{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.hero-kicker{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);margin-bottom:20px}
.hero-kicker::before{content:'';width:24px;height:2px;background:var(--cyan)}
.hero-title{font-size:clamp(42px,5.5vw,76px);font-weight:900;margin-bottom:20px;line-height:1.0}
.hero-title .accent{color:var(--cyan);display:block}
.hero-desc{font-size:18px;color:var(--text);line-height:1.7;margin-bottom:32px;max-width:500px}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:40px}
.hero-stats{display:flex;gap:32px;flex-wrap:wrap}
.hero-stat .num{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--white)}
.hero-stat .lbl{font-size:13px;color:var(--text2)}
.hero-visual{position:relative}
.poster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.poster{border-radius:8px;overflow:hidden;aspect-ratio:.67;position:relative;cursor:pointer;transition:.3s}
.poster:hover{transform:scale(1.03);z-index:2}
.poster:nth-child(2){transform:scale(1.06);z-index:1}
.poster:nth-child(2):hover{transform:scale(1.10)}
.poster-img{width:100%;height:100%;display:flex;align-items:flex-end;padding:10px;font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.poster-badge{position:absolute;top:8px;right:8px}
.live-indicator{display:flex;align-items:center;gap:6px;position:absolute;top:-16px;right:0;font-size:12px;font-weight:700;color:var(--red);font-family:'Outfit',sans-serif;letter-spacing:.08em}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.glow-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
@media(max-width:900px){.hero-content{grid-template-columns:1fr}.hero-visual{display:none}}

/* TICKER */
.ticker-wrap{background:rgba(0,212,255,.06);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 0;overflow:hidden}
.ticker-inner{display:flex;gap:0;width:max-content;animation:ticker 30s linear infinite}
.ticker-inner:hover{animation-play-state:paused}
.ticker-item{display:flex;align-items:center;gap:8px;padding:0 28px;font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;font-family:'Outfit',sans-serif;letter-spacing:.06em;text-transform:uppercase}
.ticker-sep{color:var(--cyan);font-size:16px}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* CONTENT SHOWCASE */
.showcase{padding:80px 0}
.showcase-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:40px;flex-wrap:wrap}
.showcase-tab{padding:9px 22px;border-radius:30px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:.2s;background:transparent;border:1.5px solid var(--border);color:var(--text2)}
.showcase-tab.active,.showcase-tab:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}
.content-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;scrollbar-width:thin;scrollbar-color:rgba(0,212,255,.2) transparent}
.content-card{flex:0 0 160px;border-radius:8px;overflow:hidden;cursor:pointer;transition:.3s;position:relative;group}
.content-card:hover{transform:translateY(-4px)}
.content-card-img{aspect-ratio:.67;background:var(--bg3);display:flex;align-items:flex-end;padding:10px;font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9);position:relative;overflow:hidden}
.content-card-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%);pointer-events:none}
.content-card-title{position:relative;z-index:1}
.content-card-meta{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--card);border-bottom-left-radius:8px;border-bottom-right-radius:8px}
.content-stars{color:var(--yellow);font-size:10px}
.content-year{font-size:11px;color:var(--text2)}
.content-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:44px;height:44px;border-radius:50%;background:rgba(0,212,255,.9);display:flex;align-items:center;justify-content:center;transition:.2s;z-index:2}
.content-card:hover .content-play{transform:translate(-50%,-50%) scale(1)}

/* STATS */
.stats-section{padding:64px 0;background:linear-gradient(180deg,transparent,rgba(0,98,255,.05),transparent)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;text-align:center}
.stat-card{padding:32px 20px;border-radius:var(--r);background:linear-gradient(135deg,rgba(0,212,255,.05),rgba(0,98,255,.05));border:1px solid var(--border);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.stat-num{font-family:'Outfit',sans-serif;font-size:52px;font-weight:900;color:var(--cyan);line-height:1;margin-bottom:6px}
.stat-label{font-size:15px;color:var(--text2);font-weight:500}
.stat-icon{font-size:28px;margin-bottom:12px}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr)}}

/* PRICING */
.pricing-section{padding:90px 0;background:var(--bg2)}
.pricing-urgency{text-align:center;margin-bottom:12px}
.urgency-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,53,.15);border:1px solid rgba(255,107,53,.35);color:var(--cyan);font-family:'Outfit',sans-serif;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:6px 18px;border-radius:30px}
.pricing-subtitle{text-align:center;color:var(--text2);font-size:15px;max-width:520px;margin:0 auto 8px;line-height:1.7}
.pricing-warning{display:inline-flex;align-items:flex-start;gap:8px;background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.2);border-radius:10px;padding:12px 18px;margin:16px auto 0;max-width:440px;font-size:13px;color:var(--text2);line-height:1.6;text-align:left}
.countdown-wrap{margin:28px 0 40px}
.cd-container{max-width:600px;margin:0 auto;background:linear-gradient(135deg,rgba(255,107,53,.08),rgba(255,60,20,.03));border:1px solid rgba(255,107,53,.25);border-radius:18px;padding:28px 32px;position:relative;overflow:hidden}
.cd-container::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,107,53,.1),transparent 70%);pointer-events:none}
.cd-header{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px}
.cd-pulse{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:pulse 1.2s ease infinite;flex-shrink:0}
.cd-header-text{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--white)}
.cd-blocks{display:flex;align-items:flex-start;justify-content:center;gap:8px}
.cd-block{text-align:center;flex:1;max-width:110px}
.cd-digit-pair{background:linear-gradient(180deg,#1e0e06 0%,#0d0603 100%);border:1px solid rgba(255,107,53,.3);border-radius:12px;padding:14px 8px;font-size:44px;font-weight:900;color:var(--white);line-height:1;text-align:center;box-shadow:0 4px 24px rgba(255,107,53,.12),inset 0 1px 0 rgba(255,255,255,.06);position:relative;margin-bottom:8px}
.cd-digit-pair::after{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(0,0,0,.5);pointer-events:none}
.cd-digit-pair .highlight{color:var(--cyan)}
.cd-sep-block{font-size:38px;font-weight:900;color:rgba(255,107,53,.45);padding-top:10px;line-height:1}
.cd-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text2)}
.cd-footer{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,107,53,.12);gap:12px;flex-wrap:wrap}
.cd-spots{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.cd-spots strong{color:var(--cyan);font-size:15px}
.cd-progress-bar{flex:1;min-width:80px;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.cd-progress-fill{height:100%;width:22%;background:linear-gradient(90deg,var(--cyan),#ff8c5a);border-radius:2px;box-shadow:0 0 8px rgba(255,107,53,.5)}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.price-card{padding:28px 24px;border-radius:16px;background:var(--card);border:1px solid var(--border);position:relative;transition:.3s;display:flex;flex-direction:column}
.price-card:hover{transform:translateY(-4px)}
.price-card.featured{background:linear-gradient(145deg,#150a04,#2a1008);border-color:var(--cyan);box-shadow:0 0 40px rgba(255,107,53,.2),inset 0 0 60px rgba(255,107,53,.04)}
.price-card.featured2{background:linear-gradient(145deg,#060e1a,#0a1828);border-color:rgba(255,107,53,.4)}
.price-period-label{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;color:var(--text2);text-transform:uppercase;margin-bottom:10px}
.price-old{font-size:14px;color:var(--text2);margin-bottom:2px}
.price-old s{color:var(--text2)}
.price-save{display:inline-block;font-size:11px;font-weight:700;font-family:'Outfit',sans-serif;letter-spacing:.08em;padding:2px 8px;border-radius:20px;margin-left:8px;background:rgba(0,230,118,.12);color:var(--green)}
.price-main{display:flex;align-items:baseline;gap:6px;margin-bottom:8px}
.price-kr{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--text2)}
.price-big{font-family:'Outfit',sans-serif;font-size:64px;font-weight:900;color:var(--white);line-height:1}
.price-card.featured .price-big{color:var(--cyan)}
.price-btn{width:100%;padding:14px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:.2s;text-align:center;margin:16px 0 20px;cursor:pointer}
.price-btn-solid{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#000;border:none}
.price-btn-solid:hover{box-shadow:0 6px 24px rgba(255,107,53,.5);transform:translateY(-2px)}
.price-btn-outline{background:transparent;border:1.5px solid var(--cyan);color:var(--cyan)}
.price-btn-outline:hover{background:rgba(255,107,53,.08)}
.price-what{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px}
.price-features{list-style:none;display:flex;flex-direction:column;gap:9px;flex:1}
.price-features li{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text)}
.price-features li .ck{color:var(--green);font-size:14px;flex-shrink:0}
/* Multi device */
.multi-section{padding:60px 0 80px;background:var(--bg2)}
.multi-intro{text-align:center;max-width:560px;margin:0 auto 40px}
.multi-intro h3{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--white);margin-bottom:8px}
.multi-intro p{font-size:14px;color:var(--text2);line-height:1.7}
.multi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.multi-card{padding:28px 24px;border-radius:14px;background:var(--card);border:1px solid var(--border);transition:.3s}
.multi-card:hover{border-color:var(--border2);transform:translateY(-3px)}
.multi-label{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:6px}
.multi-price{font-family:'Outfit',sans-serif;font-size:52px;font-weight:900;color:var(--white);margin-bottom:4px;line-height:1}
.multi-price-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.multi-price-sub s{color:var(--text2)}
.multi-features{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.multi-features li{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text)}
.multi-btn{width:100%;padding:12px;border-radius:8px;background:transparent;border:1.5px solid var(--cyan);color:var(--cyan);font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.multi-btn:hover{background:rgba(255,107,53,.1)}
@media(max-width:900px){.pricing-grid{grid-template-columns:1fr}.multi-grid{grid-template-columns:1fr}}
@media(max-width:600px){.cd-digit{width:38px;height:44px;font-size:24px}}

/* COMPARISON */
.compare-section{padding:80px 0}
.compare-table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:var(--r)}
.compare-table th,.compare-table td{padding:16px 20px;text-align:center;font-size:14px;border-bottom:1px solid var(--border)}

const PANEL_COUNT = 18;
const SIGMA = 2.8;
const Z_SPREAD = 42;

function StackedPanels() {
  const containerRef = useRef(null);
  const rafRef = useRef(null);
  const stateRef = useRef({
    rotY:-38, rotX:15, targetRotY:-38, targetRotX:15,
    waves: Array(18).fill(0), waveTargets: Array(18).fill(0),
    scales: Array(18).fill(1), scaleTargets: Array(18).fill(1),
    velRotY:0, velRotX:0,
    waveVels: Array(18).fill(0), scaleVels: Array(18).fill(0),
  });
  const [renderState, setRenderState] = useState({
    rotY:-38, rotX:15, waves:Array(18).fill(0), scales:Array(18).fill(1)
  });

      const IMAGES = [
    "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=400&q=80",
    "https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?w=400&q=80",
    "https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=400&q=80",
    "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400&q=80",
    "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=400&q=80",
    "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400&q=80",
    "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400&q=80",
    "https://images.unsplash.com/photo-1518676590629-3dcbd9c5a5c9?w=400&q=80",
    "https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?w=400&q=80",
    "https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=400&q=80",
    "https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=400&q=80",
    "https://images.unsplash.com/photo-1560169897-fc0cdbdfa4d5?w=400&q=80",
    "https://images.unsplash.com/photo-1542204165-65bf26472b9b?w=400&q=80",
    "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=400&q=80",
    "https://images.unsplash.com/photo-1598899134739-24c46f58b8c0?w=400&q=80",
    "https://images.unsplash.com/photo-1617593888757-6f2e82b1d16e?w=400&q=80",
    "https://images.unsplash.com/photo-1635805737707-575885ab0820?w=400&q=80",
    "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400&q=80",
  ];
  const OVERLAYS = [
    "linear-gradient(135deg,rgba(255,107,53,0.55),rgba(255,60,20,0.35))",
    "linear-gradient(135deg,rgba(0,212,255,0.5),rgba(0,98,255,0.4))",
    "linear-gradient(135deg,rgba(99,55,255,0.5),rgba(236,72,153,0.4))",
    "linear-gradient(135deg,rgba(0,230,118,0.4),rgba(0,212,255,0.5))",
    "linear-gradient(135deg,rgba(255,107,53,0.45),rgba(255,215,64,0.35))",
    "linear-gradient(135deg,rgba(0,98,255,0.5),rgba(99,55,255,0.4))",
    "linear-gradient(135deg,rgba(255,61,87,0.4),rgba(255,107,53,0.5))",
    "linear-gradient(135deg,rgba(0,212,255,0.4),rgba(0,230,118,0.5))",
    "linear-gradient(135deg,rgba(99,55,255,0.4),rgba(0,212,255,0.5))",
    "linear-gradient(135deg,rgba(255,215,64,0.4),rgba(0,230,118,0.5))",
    "linear-gradient(135deg,rgba(255,61,87,0.5),rgba(255,215,64,0.4))",
    "linear-gradient(135deg,rgba(99,55,255,0.5),rgba(0,98,255,0.4))",
    "linear-gradient(135deg,rgba(0,230,118,0.5),rgba(99,55,255,0.4))",
    "linear-gradient(135deg,rgba(236,72,153,0.4),rgba(0,98,255,0.5))",
    "linear-gradient(135deg,rgba(0,212,255,0.5),rgba(255,215,64,0.4))",
    "linear-gradient(135deg,rgba(0,98,255,0.4),rgba(0,230,118,0.5))",
    "linear-gradient(135deg,rgba(255,215,64,0.5),rgba(99,55,255,0.4))",
    "linear-gradient(135deg,rgba(255,61,87,0.4),rgba(0,212,255,0.5))",
  ];
  const LABELS = ["Stranger Things","The Last of Us","House of Dragon","Succession","Wednesday","The Crown","Breaking Bad","Game of Thrones","Chernobyl","Peaky Blinders","True Detective","Interstellar","Dune: Del 2","Oppenheimer","Premier League","Champions League","SVT1","TV4"];

  useEffect(() => {
    const spring = (cur, vel, target, stiff, damp, mass, dt) => {
      const f = (target - cur) * stiff / mass;
      const newVel = vel + f * dt - vel * damp * dt / mass;
      const newCur = cur + newVel * dt;
      return [newCur, newVel];
    };
    const tick = () => {
      const s = stateRef.current;
      const dt = 0.016;
      let changed = false;
      const [ry, rvy] = spring(s.rotY, s.velRotY, s.targetRotY, 80, 22, 1, dt);
      const [rx, rvx] = spring(s.rotX, s.velRotX, s.targetRotX, 80, 22, 1, dt);
      if(Math.abs(ry-s.rotY)>0.01||Math.abs(rx-s.rotX)>0.01) changed=true;
      s.rotY=ry; s.velRotY=rvy; s.rotX=rx; s.velRotX=rvx;
      const newWaves=[...s.waves], newScales=[...s.scales];
      for(let i=0;i<PANEL_COUNT;i++){
        const [w,wv]=spring(s.waves[i],s.waveVels[i],s.waveTargets[i],160,22,0.6,dt);
        const [sc,sv]=spring(s.scales[i],s.scaleVels[i],s.scaleTargets[i],160,22,0.6,dt);
        if(Math.abs(w-s.waves[i])>0.1) changed=true;
        newWaves[i]=w; s.waveVels[i]=wv;
        newScales[i]=sc; s.scaleVels[i]=sv;
      }
      s.waves=newWaves; s.scales=newScales;
      if(changed) setRenderState({rotY:s.rotY,rotX:s.rotX,waves:[...s.waves],scales:[...s.scales]});
      rafRef.current=requestAnimationFrame(tick);
    };
    rafRef.current=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(rafRef.current);
  }, []);

  const onMouseMove = useCallback((e) => {
    const rect = containerRef.current?.getBoundingClientRect();
    if(!rect) return;
    const cx=(e.clientX-rect.left)/rect.width;
    const cy=(e.clientY-rect.top)/rect.height;
    const s=stateRef.current;
    s.targetRotY=-38+(cx-0.5)*16;
    s.targetRotX=15+(cy-0.5)*-12;
    const pos=cx*(PANEL_COUNT-1);
    for(let i=0;i<PANEL_COUNT;i++){
      const dist=Math.abs(i-pos);
      const inf=Math.exp(-(dist*dist)/(2*SIGMA*SIGMA));
      s.waveTargets[i]=-inf*65;
      s.scaleTargets[i]=0.35+inf*0.65;
    }
  },[]);

  const onMouseLeave = useCallback(()=>{
    const s=stateRef.current;
    s.targetRotY=-38; s.targetRotX=15;
    for(let i=0;i<PANEL_COUNT;i++){s.waveTargets[i]=0;s.scaleTargets[i]=1;}
  },[]);

  const Z_SPREAD=42;
  return (
    <div ref={containerRef} onMouseMove={onMouseMove} onMouseLeave={onMouseLeave}
      style={{position:'relative',width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',userSelect:'none',perspective:'900px',cursor:'crosshair'}}>
      <div style={{
        transform:"rotateY("+renderState.rotY+"deg) rotateX("+renderState.rotX+"deg)",
        transformStyle:'preserve-3d',position:'relative',width:0,height:0,
      }}>
        {Array.from({length:PANEL_COUNT}).map((_,i)=>{
          const t=i/(PANEL_COUNT-1);
          const baseZ=(i-(PANEL_COUNT-1))*Z_SPREAD;
          const w=150+t*70, h=220+t*100;
          const opacity=0.25+t*0.75;
          const wave=renderState.waves[i]||0;
          const scale=renderState.scales[i]||1;
          return (
            <div key={i} style={{
              position:'absolute',borderRadius:10,overflow:'hidden',pointerEvents:'none',
              width:w,height:h,marginLeft:-w/2,marginTop:-h/2,
              transform:"translateZ("+baseZ+"px) translateY("+wave+"px) scaleY("+scale+")",
              transformOrigin:'bottom center',opacity,
            }}>
              <div style={{position:'absolute',inset:0,backgroundImage:"url("+IMAGES[i%IMAGES.length]+")",backgroundSize:'cover',backgroundPosition:'center'}}/>
              <div style={{position:'absolute',inset:0,background:OVERLAYS[i%OVERLAYS.length],mixBlendMode:'multiply'}}/>
              <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,0.05),rgba(0,0,0,0.5))'}}/>
              <div style={{position:'absolute',inset:0,borderRadius:'inherit',border:"1px solid rgba(255,255,255,"+(0.06+t*0.18)+")",boxSizing:'border-box'}}/>
              {t>0.7&&<div style={{position:'absolute',bottom:10,left:10,right:10,fontSize:10,fontWeight:700,color:'rgba(255,255,255,0.9)',textShadow:'0 1px 4px rgba(0,0,0,.8)'}}>{LABELS[i%LABELS.length]}</div>}
              {t>0.6&&<div style={{position:'absolute',top:8,right:8,background:'rgba(0,0,0,0.6)',backdropFilter:'blur(4px)',borderRadius:4,padding:'2px 6px',fontSize:9,fontWeight:700,color:'#ffd740'}}>{(8.5+t*0.8).toFixed(1)}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CardStack({ items, autoAdvance=false, intervalMs=2800 }) {
  const [active, setActive] = useState(0);
  const [hovering, setHovering] = useState(false);
  const len = items.length;
  const maxOffset = 3;
  const cardW = 170, cardH = 250;
  const spacing = 95;
  const spreadDeg = 5;

  useEffect(() => {
    if (!autoAdvance || hovering) return;
    const iv = setInterval(() => setActive(a => (a+1)%len), intervalMs);
    return () => clearInterval(iv);
  }, [autoAdvance, intervalMs, hovering, len]);

  const wrap = n => ((n%len)+len)%len;
  const signedOff = (i, act) => {
    const raw = i - act;
    if (len <= 1) return raw;
    const alt = raw > 0 ? raw - len : raw + len;
    return Math.abs(alt) < Math.abs(raw) ? alt : raw;
  };

  return (
    <div onMouseEnter={()=>setHovering(true)} onMouseLeave={()=>setHovering(false)}>
      <div style={{position:'relative',height:cardH+90,perspective:'1200px'}}>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
          {items.map((item,i) => {
            const off = signedOff(i, active);
            const abs = Math.abs(off);
            if (abs > maxOffset) return null;
            const isActive = off === 0;
            const x = off * spacing;
            const y = abs * 10 + (isActive ? -22 : 0);
            const rotZ = off * spreadDeg;
            const rotX = isActive ? 0 : 10;
            const scale = isActive ? 1.04 : Math.max(0.82, 1 - abs*0.06);
            const zIndex = 100 - abs;
            const opacity = abs > 2 ? 0.6 : 1;
            return (
              <div key={item.id} onClick={()=>setActive(i)}
                style={{
                  position:'absolute', bottom:0,
                  width:cardW, height:cardH,
                  marginLeft:-cardW/2,
                  transform:`translateX(${x}px) translateY(${y}px) rotateZ(${rotZ}deg) rotateX(${rotX}deg) scale(${scale})`,
                  transition:'transform 0.55s cubic-bezier(0.34,1.15,0.64,1), box-shadow 0.3s',
                  transformStyle:'preserve-3d',
                  zIndex, opacity,
                  borderRadius:12,
                  overflow:'hidden',
                  cursor: isActive ? 'default' : 'pointer',
                  boxShadow: isActive ? '0 24px 60px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,107,53,0.4)' : '0 10px 30px rgba(0,0,0,0.5)',
                  border: isActive ? '2px solid rgba(255,107,53,0.5)' : '2px solid rgba(255,255,255,0.06)',
                }}>
                <div style={{position:'absolute',inset:0,backgroundImage:`url(${item.img})`,backgroundSize:'cover',backgroundPosition:'center'}}/>
                <div style={{position:'absolute',inset:0,background:`linear-gradient(to bottom,${item.overlay} 0%,rgba(0,0,0,0.7) 100%)`}}/>
                <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,0.8) 0%,transparent 50%)'}}/>
                {isActive && <div style={{position:'absolute',top:10,right:10,background:'rgba(255,107,53,0.9)',borderRadius:6,padding:'3px 8px',fontSize:10,fontWeight:800,color:'#fff',fontFamily:"'Outfit',sans-serif",letterSpacing:'.06em'}}>HD</div>}
                <div style={{position:'absolute',top:8,left:8,background:'rgba(0,0,0,0.65)',backdropFilter:'blur(4px)',borderRadius:6,padding:'2px 7px',fontSize:10,fontWeight:700,color:'#ffd740'}}>{item.rating}</div>
                <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 10px'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#fff',textShadow:'0 1px 4px rgba(0,0,0,.9)',marginBottom:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.title}</div>
                  <div style={{fontSize:10,color:'rgba(255,255,255,0.6)'}}>{item.year}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:20}}>

function Countdown() {
  const [time, setTime] = useState({d:0,h:2,m:47,s:50});
  useEffect(()=>{
    const iv = setInterval(()=>{
      setTime(t=>{
        let {d,h,m,s} = t;
        s--; if(s<0){s=59;m--;} if(m<0){m=59;h--;} if(h<0){h=23;d--;} if(d<0){d=0;h=0;m=0;s=0;}
        return {d,h,m,s};
      });
    },1000);
    return ()=>clearInterval(iv);
  },[]);
  const pad = n=>String(n).padStart(2,'0');
  const blocks = [{val:time.d,label:'Dagar'},{val:time.h,label:'Timmar'},{val:time.m,label:'Minuter'},{val:time.s,label:'Sekunder'}];
  return (
    <div className="countdown-wrap">
      <div className="cd-container">
        <div className="cd-header">
          <div className="cd-pulse"/>
          <span className="cd-header-text">Erbjudandet upphör om — säkra ditt pris nu</span>
          <div className="cd-pulse"/>
        </div>
        <div className="cd-blocks">
          {blocks.map((b,i)=>(
            <React.Fragment key={i}>
              {i>0 && <div className="cd-sep-block">:</div>}
              <div className="cd-block">
                <div className="cd-digit-pair">{pad(b.val)}</div>
                <div className="cd-label">{b.label}</div>
              </div>
            </React.Fragment>
          ))}
        </div>
        <div className="cd-footer">
          <div className="cd-spots">🔥 Endast <strong>23</strong> platser kvar till detta pris</div>
          <div className="cd-progress-bar"><div className="cd-progress-fill"/></div>
          <div style={{fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}}>77% redan tagna</div>
        </div>
      </div>
    </div>
  );

    {id:'sv',   x:820, y:410, label:'Svenska Kanaler', icon:'🇸🇪', type:'content'},
    {id:'epg',  x:340, y:55,  label:'EPG Guide',       icon:'📅', type:'feature'},
    {id:'cu',   x:560, y:55,  label:'Catch-up TV',     icon:'⏪', type:'feature'},
    {id:'sup',  x:340, y:435, label:'24/7 Support',    icon:'💬', type:'feature'},
    {id:'sec',  x:560, y:435, label:'Säker Streaming', icon:'🔒', type:'feature'},
  ];
  const paths = nodes.map((n,i) => ({from:{x:n.x,y:n.y}, to:{x:cx,y:cy}, id:n.id, delay:i*0.15}));
  useEffect(() => {
    const lines = paths.map((p,i) => {
      const len = Math.hypot(p.to.x-p.from.x, p.to.y-p.from.y);
      return '@keyframes fl'+i+'{from{stroke-dashoffset:'+len+'}to{stroke-dashoffset:'+(-len)+'}}';
    });
    const el = document.createElement('style');
    el.id = 'eco-kf';
    el.textContent = lines.join(' ');
    document.head.appendChild(el);
    return () => { const e = document.getElementById('eco-kf'); if(e) e.remove(); };
  }, []);
  const tClass = {device:'eco-pill-device',content:'eco-pill-content',feature:'eco-pill-feature'};
  const dClass = {device:'dot-cyan',content:'dot-orange',feature:'dot-green'};
  return (
    <section className="ecosystem-section">
      <div className="container">
        <div className="eco-text">
          <span className="tag tag-cyan" style={{marginBottom:16}}>⚡ Ekosystem</span>
          <h2><strong>Allt kopplat.</strong> <span style={{color:'var(--text2)',fontWeight:400,fontSize:'0.85em'}}>Streama till alla enheter via en enda tjänst.</span></h2>
          <p>Nordic IPTV kopplar ihop dina enheter med tusentals kanaler, live-sport, filmer och mer — med noll buffring och maximalt skydd.</p>
        </div>
        <div className="eco-canvas">
          <svg className="eco-svg" viewBox={"0 0 "+W+" "+H} preserveAspectRatio="xMidYMid meet">
            {paths.map((p,i) => (
              <line key={"s"+i} x1={p.from.x} y1={p.from.y} x2={p.to.x} y2={p.to.y}
                stroke={p.id.match(/tv|mob|pc|fire/) ? "rgba(0,212,255,0.12)" : p.id.match(/epg|cu|sup|sec/) ? "rgba(0,230,118,0.1)" : "rgba(255,107,53,0.12)"}
                strokeWidth="1" strokeDasharray="4 6"/>
            ))}
            {paths.map((p,i) => {
              const len = Math.hypot(p.to.x-p.from.x, p.to.y-p.from.y);
              const color = p.id.match(/tv|mob|pc|fire/) ? "#00d4ff" : p.id.match(/epg|cu|sup|sec/) ? "#00e676" : "#ff6b35";
              return (
                <line key={"a"+i} x1={p.from.x} y1={p.from.y} x2={p.to.x} y2={p.to.y}
                  stroke={color} strokeWidth="1.5" strokeOpacity="0.7"
                  strokeDasharray={String(len*0.18)+" "+String(len*0.82)}
                  style={{strokeDashoffset:len,animation:"fl"+i+" "+(2.8+i*0.1)+"s linear infinite"}}/>
              );
            })}
            {paths.map((p,i) => {
              const color = p.id.match(/tv|mob|pc|fire/) ? "#00d4ff" : p.id.match(/epg|cu|sup|sec/) ? "#00e676" : "#ff6b35";
              return (
                <React.Fragment key={"f"+i}>
                  <path id={"pp"+i} d={"M"+p.from.x+" "+p.from.y+" L"+p.to.x+" "+p.to.y} fill="none" stroke="none"/>
                  <circle r="3.5" fill={color}>
                    <animateMotion dur={(2.5+i*0.12)+"s"} repeatCount="indefinite" begin={p.delay+"s"}>
                      <mpath href={"#pp"+i}/>
                    </animateMotion>
                  </circle>
                </React.Fragment>
              );
            })}
          </svg>
          <div className="eco-node" style={{left:'50%',top:'50%'}}>
            <div className="eco-hub">
              <div className="eco-hub-ring"/>
              <div className="eco-hub-ring2"/>
              <div style={{fontSize:22,marginBottom:4}}>📡</div>
              <div className="eco-hub-label">Nordic<br/>IPTV</div>
              <div className="eco-hub-sub">Live 24/7</div>
            </div>
          </div>
          {nodes.map((n,i) => (
            <div key={i} className="eco-node" style={{left:(n.x/W*100)+"%",top:(n.y/H*100)+"%"}}>
              <div className={"eco-pill "+tClass[n.type]}>
                <span className={"eco-pill-dot "+dClass[n.type]}/>
                <span>{n.icon}</span>
                <span>{n.label}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function ScrollTop() {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const h = () => setVisible(window.scrollY > 400);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <div className={`scroll-top ${visible?'visible':''}`} onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}>↑</div>
  );
}
